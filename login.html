<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UAD</title>
  <meta name="description" content="UAD Clan — Members only." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>


  <nav class="topnav">
    <div class="topnav-inner">
      <a href="index.html" class="nav-logo">UAD</a>

      <!-- Left: login page scroll sections -->
      <div class="nav-boxes nav-sections">
        <a href="#login" class="nav-box" data-section="login" data-i18n="system.nav">System</a>
        <a href="#note"  class="nav-box" data-section="note"  data-i18n="nav.note">Note</a>
      </div>

      <!-- Right: system controls -->
      <div class="nav-boxes nav-pages">
        <a href="login.html" class="nav-box nav-page active" data-i18n="nav.clan">Clan</a>
        <select class="nav-box nav-page lang-select" onchange="setLanguage(this.value)">
          <option value="en">EN</option>
          <option value="tr">TR</option>
          <option value="de">DE</option>
        </select>
      </div>
    </div>
  </nav>

  <!-- System Access -->
  <section id="login" class="login-section">
    <div class="login-box">
      <p class="login-gate" data-i18n="system.gate">UAD System</p>
      <p class="login-sub" data-i18n="system.sub">Authorised access only.</p>
      <a href="https://sys.corp.com.tr/login.html" class="sys-enter-btn" data-i18n="system.enter">Enter</a>
    </div>
  </section>

  <!-- Note -->
  <section id="note" class="login-section">
    <div class="login-box login-box--wide">
      <p class="login-gate" data-i18n="login.note.gate">Leave a note.</p>
      <form class="login-form" action="https://formspree.io/f/xbdqvljq" method="POST">
        <input type="hidden" name="_subject" value="New strategic note — uad145" />
        <input type="hidden" name="_next" value="https://uad145.com/login.html#note" />
        <div class="field">
          <label for="note-name" data-i18n="note.name">Name</label>
          <input type="text" id="note-name" name="name" data-i18n="note.name.placeholder" placeholder="Your name" autocomplete="off" />
        </div>
        <div class="field">
          <label for="note-email" data-i18n="note.email">Email</label>
          <input type="email" id="note-email" name="email" placeholder="your@email.com" autocomplete="off" required />
        </div>
        <div class="field">
          <label for="note-message" data-i18n="note.message">Message</label>
          <textarea id="note-message" name="message" rows="4" data-i18n="note.message.placeholder" placeholder="Write something..." required></textarea>
        </div>
        <button type="submit" data-i18n="note.submit">Send</button>
      </form>
    </div>
  </section>

  <script src="lang.js"></script>
  <script>
    const sections = document.querySelectorAll('section[id]');
    const navBoxes = document.querySelectorAll('.nav-box[data-section]');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          navBoxes.forEach(b => b.classList.remove('active'));
          const active = document.querySelector(`.nav-box[data-section="${entry.target.id}"]`);
          if (active) active.classList.add('active');
        }
      });
    }, {
      rootMargin: '-40% 0px -55% 0px',
      threshold: 0
    });
    sections.forEach(s => observer.observe(s));
  </script>
</body>
</html>
